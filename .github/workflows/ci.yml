name: Shield Disaster AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app-desktop/package-lock.json
      - run: npm install
      - run: npm run build

  test-react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app-desktop/package-lock.json
      - run: npm install
      - run: npm test

  lint-react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app-desktop/package-lock.json
      - run: npm install
      - run: npm run lint

  python-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests
